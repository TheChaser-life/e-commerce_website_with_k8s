name: Build, push and deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'helm/**'

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  Detect-source-code-changes:
    runs-on: ubuntu-latest
    outputs: 
      changed-source-code-paths: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.ref }}
          filters: |
            order-service: 'backend/order-service/**'
            product-service: 'backend/product-service/**'
            user-service: 'backend/user-service/**'
            frontend: 'frontend/**'
  
  Detect-manifest-changes:
    runs-on: ubuntu-latest
    outputs: 
      changed-manifest-paths: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.ref }}
          filters: |
            order-service: 'helm/order-service/**'
            product-service: 'helm/product-service/**'
            user-service: 'helm/user-service/**'
            frontend: 'helm/frontend/**'

  build-push:
    needs: Detect-source-code-changes
    if: needs.Detect-source-code-changes.outputs.changed-source-code-paths != '[]'
    name: Build and push Docker images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      CHANGED_SERVICES: ${{ needs.Detect-source-code-changes.outputs.changed-source-code-paths }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make list of changed services
        run: |
          CHANGED_SOURCE_CODE_PATHS=$(echo '${{ env.CHANGED_SERVICES }}' | jq -r '. | join(" ")')
          echo "CHANGED_SOURCE_CODE_PATHS=$CHANGED_SOURCE_CODE_PATHS" >> $GITHUB_ENV
          echo "Changed source code paths: $CHANGED_SOURCE_CODE_PATHS"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Download Maven dependencies and Compile source code
        run: |
          for path in ${{ env.CHANGED_SOURCE_CODE_PATHS }}; do
            if [[ "$path" == "frontend" ]]; then 
              echo "Frontend is not a maven project"
            else 
              mvn dependency:go-offline -pl ${path}
              mvn clean package -DskipTests -pl ${path}
            fi
          done

      - name: Log in to Docker Hub
        uses: docker/login-action@v5
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        run: |
          for path in ${{ env.CHANGED_SOURCE_CODE_PATHS }}; do
            if [[ "$path" != "frontend" ]]; then
              docker build -t ${{ env.DOCKERHUB_REPO }}/$path:${{ env.IMAGE_TAG }} backend/$path
            else
              docker build -t ${{ env.DOCKERHUB_REPO }}/$path:${{ env.IMAGE_TAG }} frontend
            fi
            docker push ${{ env.DOCKERHUB_REPO }}/$path:${{ env.IMAGE_TAG }}
          done

  Redeploy service deployments and manifests:
    needs: [Detect-source-code-changes, Detect-manifest-changes, build-push]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.Detect-source-code-changes.outputs.changed-source-code-paths != '[]' || 
       needs.Detect-manifest-changes.outputs.changed-manifest-paths != '[]')
    runs-on: [self-hosted, linux]
    env:
      CHANGED_MANIFESTS: ${{ needs.Detect-manifest-changes.outputs.changed-manifest-paths }}
      CHANGED_SOURCE_CODE_PATHS: ${{ needs.Detect-source-code-changes.outputs.changed-source-code-paths }}
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make list of changed manifests
        run: |
          CHANGED_MANIFESTS=$(echo '${{ env.CHANGED_MANIFESTS }}' | jq -r '. | join(" ")')
          echo "CHANGED_MANIFESTS=$CHANGED_MANIFESTS" >> $GITHUB_ENV
          echo "Changed manifest paths: $CHANGED_MANIFESTS"

          CHANGED_SOURCE_CODE_PATHS=$(echo '${{ env.CHANGED_SOURCE_CODE_PATHS }}' | jq -r '. | join(" ")')
          echo "CHANGED_SOURCE_CODE_PATHS=$CHANGED_SOURCE_CODE_PATHS" >> $GITHUB_ENV
          echo "Changed source code paths: $CHANGED_SOURCE_CODE_PATHS"
          
      - name: Redeploy service deployments 
        run: |
          for path in ${{ env.CHANGED_SOURCE_CODE_PATHS }}; do
            kubectl set image deployment/$path $path=${{ env.DOCKERHUB_REPO }}/$path:${{ env.IMAGE_TAG }} --namespace default
          done

      - name: Redeploy service manifests 
        run: |
          for path in ${{ env.CHANGED_MANIFESTS }}; do
            kubectl apply -f helm/$path --namespace default
          done 

