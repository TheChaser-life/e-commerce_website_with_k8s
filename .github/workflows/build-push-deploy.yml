name: Build, push and deploy

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'helm/**'

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Log in to Docker Hub
        uses: docker/login-action@v5
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push order-service image
        working-directory: backend/order-service
        run: |
          mvn -B package -DskipTests
          docker build -t docker.io/${{ env.DOCKERHUB_REPO }}/order-service:${{ env.IMAGE_TAG }} .
          docker push docker.io/${{ env.DOCKERHUB_REPO }}/order-service:${{ env.IMAGE_TAG }}

      - name: Build and push product-service image
        working-directory: backend/product-service
        run: |
          mvn -B package -DskipTests
          docker build -t docker.io/${{ env.DOCKERHUB_REPO }}/product-service:${{ env.IMAGE_TAG }} .
          docker push docker.io/${{ env.DOCKERHUB_REPO }}/product-service:${{ env.IMAGE_TAG }}

      - name: Build and push user-service image
        working-directory: backend/user-service
        run: |
          mvn -B package -DskipTests
          docker build -t docker.io/${{ env.DOCKERHUB_REPO }}/user-service:${{ env.IMAGE_TAG }} .
          docker push docker.io/${{ env.DOCKERHUB_REPO }}/user-service:${{ env.IMAGE_TAG }}

      - name: Build and push frontend image
        working-directory: frontend
        run: |
          npm ci
          npm run build
          docker build -t docker.io/${{ env.DOCKERHUB_REPO }}/frontend:${{ env.IMAGE_TAG }} .
          docker push docker.io/${{ env.DOCKERHUB_REPO }}/frontend:${{ env.IMAGE_TAG }}

  deploy-local:
    name: Deploy to local cluster
    needs: build-push
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tags
        run: |
          echo "ORDER_IMAGE=docker.io/${{ env.DOCKERHUB_REPO }}/order-service:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV
          echo "PRODUCT_IMAGE=docker.io/${{ env.DOCKERHUB_REPO }}/product-service:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV
          echo "USER_IMAGE=docker.io/${{ env.DOCKERHUB_REPO }}/user-service:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=docker.io/${{ env.DOCKERHUB_REPO }}/frontend:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV

      - name: Deploy with kubectl
        run: |
          kubectl set image deployment/order-service order-service=${{ env.ORDER_IMAGE }} --namespace default
          kubectl set image deployment/product-service product-service=${{ env.PRODUCT_IMAGE }} --namespace default
          kubectl set image deployment/user-service user-service=${{ env.USER_IMAGE }} --namespace default
          kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }} --namespace default

      - name: Optionally upgrade Helm chart
        if: false
        run: |
          helm upgrade --install my-app helm/your-chart \
            --set orderService.image=${{ env.ORDER_IMAGE }} \
            --set productService.image=${{ env.PRODUCT_IMAGE }} \
            --set userService.image=${{ env.USER_IMAGE }} \
            --set frontend.image=${{ env.FRONTEND_IMAGE }}
