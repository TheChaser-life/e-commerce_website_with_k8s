name: Build, push and deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'helm/**'

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # job lọc ra các service có sự thay đổi source code 
  Detect-source-code-changes:
    runs-on: ubuntu-latest
    outputs: 
      changed-source-code-paths: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.ref }}
          filters: |
            order-service: 'backend/order-service/**'
            product-service: 'backend/product-service/**'
            user-service: 'backend/user-service/**'
            frontend: 'frontend/**'
  
  # job lọc ra các service có sự thay đổi manifest
  Detect-manifest-changes:
    runs-on: ubuntu-latest
    outputs: 
      changed-manifest-paths: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.ref }}
          filters: |
            order-service: 'helm/order-service-chart/**'
            product-service: 'helm/product-service-chart/**'
            user-service: 'helm/user-service-chart/**'
            frontend: 'helm/frontend-chart/**'
            mysql: 'helm/mysql-chart/**'

  # job build và push image
  build-push:
    needs: Detect-source-code-changes
    if: | # điều kiện chạy job này là có sự thay đổi source code
      needs.Detect-source-code-changes.outputs.changed-source-code-paths != '[]' 
    name: Build and push Docker images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      CHANGED_SERVICES: ${{ needs.Detect-source-code-changes.outputs.changed-source-code-paths }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make list of changed services
        run: |
          CHANGED_SOURCE_CODE_PATHS=$(echo '${{ env.CHANGED_SERVICES }}' | jq -r '. | join(" ")')
          echo "CHANGED_SOURCE_CODE_PATHS=$CHANGED_SOURCE_CODE_PATHS" >> $GITHUB_ENV
          echo "Changed source code paths: $CHANGED_SOURCE_CODE_PATHS"

      # Cache các thư viện đã tải để lần sau build nhanh hơn, tránh phải tải lại từ đầu
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Build file thực thi cho các java service 
      - name: Download Maven dependencies and Compile source code
        run: |
          for path in ${{ env.CHANGED_SOURCE_CODE_PATHS }}; do
            if [[ "$path" == "frontend" ]]; then 
              echo "Frontend is not a maven project"
            else 
              mvn clean package -DskipTests -f backend/${path}/pom.xml
            fi
          done

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        run: |
          for path in ${{ env.CHANGED_SOURCE_CODE_PATHS }}; do
            if [[ "$path" != "frontend" ]]; then
              docker build -t ${{ env.DOCKERHUB_REPO }}/$path:${{ env.IMAGE_TAG }} backend/$path
            else
              docker build -t ${{ env.DOCKERHUB_REPO }}/$path:${{ env.IMAGE_TAG }} frontend
            fi
            docker push ${{ env.DOCKERHUB_REPO }}/$path:${{ env.IMAGE_TAG }}
          done

  # Job deploy các service vào cluster bằng helm và push chart vào docker hub
  Redeploy-service-deployments-and-manifests:
    needs: [Detect-source-code-changes, Detect-manifest-changes, build-push]
    # Cho phép kiểm tra jib ngay cả khi job trước bị skip
    # và không có job nào bị lỗi hoặc bị huỷ
    # có sự thay đổi source code hoặc manifest
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.Detect-source-code-changes.outputs.changed-source-code-paths != '[]' || 
       needs.Detect-manifest-changes.outputs.changed-manifest-paths != '[]')
    runs-on: [self-hosted, linux]
    name: Redeploy service deployments and manifests
    env:
      CHANGED_MANIFESTS: ${{ needs.Detect-manifest-changes.outputs.changed-manifest-paths }}
      CHANGED_SOURCE_CODE_PATHS: ${{ needs.Detect-source-code-changes.outputs.changed-source-code-paths }}
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make list of changed manifests
        run: |
          # Parse JSON outputs
          MANIFESTS=$(echo '${{ env.CHANGED_MANIFESTS }}' | jq -r '. | join(" ")')
          SOURCES=$(echo '${{ env.CHANGED_SOURCE_CODE_PATHS }}' | jq -r '. | join(" ")')
          
          # Create unique list of services để tránh bị trùng, push 1 chart 2 lần
          UNIQUE=$(echo "$MANIFESTS $SOURCES" | tr ' ' '\n' | grep -v '^$' | sort -u | xargs)
          
          echo "CHANGED_MANIFESTS=$MANIFESTS" >> $GITHUB_ENV
          echo "CHANGED_SOURCE_CODE_PATHS=$SOURCES" >> $GITHUB_ENV
          echo "UNIQUE_SERVICES=$UNIQUE" >> $GITHUB_ENV
          
          echo "Unique services to process: $UNIQUE"
          
      - name: Redeploy services with Helm
        run: |
          for service in $UNIQUE_SERVICES; do
            echo "Deploying/Updating service: $service"

            if echo "$CHANGED_SOURCE_CODE_PATHS" | grep -w "$service"; then
              echo "Source changed for $service, deploying new image tag: ${{ env.IMAGE_TAG }}"
              helm upgrade --install $service ./helm/${service}-chart \
                --set image.repository=${{ env.DOCKERHUB_REPO }}/$service \
                --set image.tag=${{ env.IMAGE_TAG }} \
                --namespace default
            else
              echo "Only manifest changed for $service, keeping image tag from values/current chart"
              helm upgrade --install $service ./helm/${service}-chart \
                --reuse-values \
                --namespace default
            fi
          done


      - name: Login to Docker Hub
        if: needs.Detect-manifest-changes.outputs.changed-manifest-paths != '[]'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build And Push Helm Charts to Docker Hub
        if: needs.Detect-manifest-changes.outputs.changed-manifest-paths != '[]'
        run: |
          echo ${{ secrets.DOCKERHUB_TOKEN }} | helm registry login registry-1.docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          
          for service in $CHANGED_MANIFESTS; do
            echo "Packaging and pushing chart for: $service"
            # Đóng gói các file manifest thành file .tgz
            CHART_VERSION="0.1.${{ github.run_number }}"

            rm -f ${service}-*.tgz
            helm package ./helm/${service}-chart --version "$CHART_VERSION"
            helm push ${service}-${CHART_VERSION}.tgz oci://registry-1.docker.io/${{ secrets.DOCKERHUB_USERNAME }}
            rm -f ${service}-*.tgz
          done

